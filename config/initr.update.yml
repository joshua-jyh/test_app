application: test_app
keep_releases: 5
default_environment: staging

system:
  sudo_command: sudo

shared:
  directories:
    - log
    - tmp/pids
    - tmp/cache
    - storage
    - public/uploads
  files:
    - .env

commands:
  bundle: bundle config set --local deployment true && bundle config set --local without 'development test' && bundle install
  frontend_install: npm ci
  frontend_build: npm run build
  precompile_assets: bundle exec rails assets:precompile
  migrate: bundle exec rails db:migrate
  seed: bundle exec rails db:seed
  update_task: bundle exec rails %{task}
  restart_app: bin/deploy-server restart

# 若更新前需要執行一次性資料修正，填入 Rails task，例如 data:backfill。
update:
  task: ''

whenever:
  enabled: true
  identifier: ''
  clear_legacy_timestamp_crontabs: true

database:
  adapter: mysql
  host: 127.0.0.1
  port: 3306
  username: test_app
  password: ''
  database: test_app_staging
  use_sudo_for_backup: false

web_server:
  preferred: nginx
  service_name: nginx
  config_path: /etc/nginx/sites-enabled/test_app.conf

environments:
  staging:
    rails_env: staging
    branch: staging
    server_name: staging.test-app.local
    app_port: 3001
    run_seeds: false
    commands:
      restart_app: RAILS_ENV=staging PORT=3001 bin/deploy-server restart
    database:
      database: test_app_staging
  production:
    rails_env: production
    branch: main
    server_name: test-app.local
    app_port: 3000
    run_seeds: false
    commands:
      restart_app: RAILS_ENV=production PORT=3000 bin/deploy-server restart
    database:
      database: test_app_production
